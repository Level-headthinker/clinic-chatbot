<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClinicBot Chat</title>
  <style>
    :root {
      --teal: #0d9488;
      --teal-dark: #0f766e;
      --surface: #ffffff;
      --line: #dbe3ee;
      --text: #172033;
      --muted: #667085;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef5f4;
      display: grid;
      place-items: center;
      padding: 16px;
      color: var(--text);
    }

    .chat-wrapper {
      width: min(420px, 100%);
      height: min(680px, calc(100vh - 32px));
      min-height: 560px;
      background: var(--surface);
      border: 1px solid rgba(15, 23, 42, 0.12);
      border-radius: 28px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: var(--teal);
      color: white;
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      background: rgba(255,255,255,0.18);
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .name {
      font-weight: 800;
      font-size: 16px;
    }

    .status {
      color: #ccfbf1;
      font-size: 12px;
      margin-top: 2px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background:
        linear-gradient(rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0.86)),
        repeating-linear-gradient(45deg, #edf7f5 0 8px, #f8fafc 8px 16px);
    }

    .msg {
      max-width: 82%;
      border-radius: 16px;
      padding: 11px 13px;
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-line;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      word-break: break-word;
    }

    .msg.bot {
      align-self: flex-start;
      background: #ffffff;
      border-bottom-left-radius: 4px;
    }

    .msg.user {
      align-self: flex-end;
      background: #d9fdd3;
      color: #163b1c;
      border-bottom-right-radius: 4px;
    }

    .typing {
      color: var(--muted);
    }

    .input-area {
      padding: 12px;
      border-top: 1px solid var(--line);
      display: flex;
      gap: 8px;
      align-items: center;
      background: #ffffff;
    }

    .input-area input {
      flex: 1;
      min-width: 0;
      padding: 12px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 14px;
      outline: none;
      background: #f3f6f9;
    }

    .input-area input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.16);
    }

    .send-btn {
      width: 42px;
      height: 42px;
      background: var(--teal);
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .send-btn:disabled {
      background: #8dd7cf;
      cursor: not-allowed;
    }

    .powered {
      text-align: center;
      font-size: 11px;
      color: #8a98aa;
      padding: 8px;
      border-top: 1px solid #f1f5f9;
      background: #ffffff;
    }

    @media (max-width: 520px) {
      body { padding: 0; }
      .chat-wrapper {
        width: 100%;
        height: 100vh;
        min-height: 100vh;
        border-radius: 0;
        border: 0;
      }
    }
  </style>
</head>
<body>

<div class="chat-wrapper">
  <div class="chat-header">
    <div class="avatar">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 2v20"/>
        <path d="M5 8h12a4 4 0 0 1 0 8H5"/>
        <path d="M5 8v8"/>
      </svg>
    </div>
    <div>
      <div class="name" id="botName">ClinicBot</div>
      <div class="status">Online - ready to help</div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input
      type="text"
      id="input"
      placeholder="Type your message..."
      autocomplete="off"
    />
    <button class="send-btn" id="sendBtn" aria-label="Send message">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="m22 2-7 20-4-9-9-4Z"/>
        <path d="M22 2 11 13"/>
      </svg>
    </button>
  </div>

  <div class="powered">Powered by ClinicBot AI</div>
</div>

<script>
  const BACKEND = "https://clinic-chatbot-backend-eysi.onrender.com";
  const params = new URLSearchParams(window.location.search);
  const CLINIC_SLUG = params.get("clinic") || "city-clinic";
  const clinicName = CLINIC_SLUG
    .split("-")
    .filter(Boolean)
    .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
    .join(" ");

  document.title = clinicName ? `${clinicName} Chat` : "ClinicBot Chat";
  document.getElementById("botName").textContent = clinicName ? `${clinicName} Bot` : "ClinicBot";

  let sessionToken = null;
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");

  function escapeHtml(value) {
    const div = document.createElement("div");
    div.textContent = value;
    return div.innerHTML;
  }

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = escapeHtml(text);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "msg bot typing";
    div.id = "typing";
    div.textContent = "Typing...";
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    sendBtn.disabled = true;
    addMessage("user", text);
    showTyping();

    try {
      const res = await fetch(`${BACKEND}/chat/message`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: text,
          tenant_slug: CLINIC_SLUG,
          session_token: sessionToken
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Chat failed");
      sessionToken = data.session_token;
      removeTyping();
      addMessage("bot", data.reply);
    } catch {
      removeTyping();
      addMessage("bot", "Sorry, something went wrong. Please try again.");
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  window.onload = () => {
    addMessage("bot", `Hello! I am your ${clinicName || "clinic"} assistant. How can I help you today?`);
    inputEl.focus();
  };
</script>

</body>
</html>
