<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>City Clinic — Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-wrapper {
      width: 420px;
      height: 650px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #1e3a5f;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .bot-info .name {
      color: #fff;
      font-weight: 700;
      font-size: 16px;
    }

    .bot-info .status {
      color: #86efac;
      font-size: 12px;
      margin-top: 2px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      display: flex;
      max-width: 80%;
    }

    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
    }

    .msg.bot .bubble {
      background: #f1f5f9;
      color: #1e293b;
      border-bottom-left-radius: 4px;
    }

    .msg.user .bubble {
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .typing .bubble {
      color: #94a3b8;
      font-style: italic;
    }

    .input-area {
      padding: 16px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 24px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      outline: none;
    }

    .input-area input:focus {
      border-color: #2563eb;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      background: #2563eb;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .send-btn:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .powered {
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
      padding: 8px;
      border-top: 1px solid #f3f4f6;
    }
  </style>
</head>
<body>

<div class="chat-wrapper">
  <div class="chat-header">
    <div class="avatar">🏥</div>
    <div class="bot-info">
      <div class="name">City Clinic Bot</div>
      <div class="status">● Online — Ready to help</div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input
      type="text"
      id="input"
      placeholder="Type a message..."
      autocomplete="off"
    />
    <button class="send-btn" id="sendBtn">
      <svg viewBox="0 0 24 24">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <div class="powered">Powered by ClinicBot AI</div>
</div>

<script>
  const BACKEND = "http://127.0.0.1:8000";
  const CLINIC_SLUG = "city-clinic";

  let sessionToken = null;
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="bubble">${text}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "msg bot typing";
    div.id = "typing";
    div.innerHTML = `<div class="bubble">Typing...</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    sendBtn.disabled = true;
    addMessage("user", text);
    showTyping();

    try {
      const res = await fetch(`${BACKEND}/chat/message`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: text,
          tenant_slug: CLINIC_SLUG,
          session_token: sessionToken
        })
      });

      const data = await res.json();
      sessionToken = data.session_token;
      removeTyping();
      addMessage("bot", data.reply);
    } catch (err) {
      removeTyping();
      addMessage("bot", "Sorry, something went wrong. Please try again.");
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // Send on button click
  sendBtn.addEventListener("click", sendMessage);

  // Send on Enter key
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  // Welcome message on load
  window.onload = () => {
    addMessage("bot", "Hello! I am your City Clinic assistant. How can I help you today?");
    inputEl.focus();
  };
</script>

</body>
</html>
